# ──────────────────────────────────────────────────────────────
# 로컬 인프라 + (옵션) 앱 컨테이너.
#   docker compose up -d                     # postgres + kafka 만
#   docker compose --profile app up --build  # 앱까지
# [WHY] CLAUDE.md §9 — 한 번에 기동 가능해야 함 / Kafka KRaft (Zookeeper X).
# ──────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kcd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kcd_report}
      POSTGRES_USER: ${DB_USERNAME:-kcd}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kcd_local_pw}
      TZ: UTC
      PGTZ: UTC
    ports:
      # [WHY] 호스트 5432는 외부 프로젝트(local-postgres) 점유 가능성 → 충돌 회피.
      #        컨테이너 내부 통신은 그대로 5432, 호스트만 15432로 매핑.
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # [WHY] 앱이 너무 빨리 뜨면 Flyway 가 실패하므로 healthy 후 시작.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kcd} -d ${DB_NAME:-kcd_report}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - kcd-net

  # ── Apache Kafka 3.7 (KRaft mode, no Zookeeper) ──────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: kcd-kafka
    restart: unless-stopped
    ports:
      # [WHY] 9092 는 컨테이너 내부 advertised(kafka:9092) 전용 — 호스트로 노출 X.
      #        호스트(IDE/테스트)에서 접속하려면 PLAINTEXT_HOST 리스너(29092) 사용.
      - "29092:29092"
    environment:
      # [WHY] KRaft 모드 — controller + broker 동거. 단일 노드 로컬 개발용.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      # [WHY] 컨테이너 내부(앱) → kafka:9092, 호스트(IDE/테스트) → localhost:29092.
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # 단일 노드 → 복제 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # [WHY] 토픽은 코드에서 명시적으로 생성 — 의도치 않은 자동 생성 방지.
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - kcd-net

  # ── (선택) Kafka UI — 디버깅용 ─────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kcd-kafka-ui
    profiles: ["tools"]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kcd-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kcd-net

  # ── 앱 컨테이너 (profile=app 일 때만 기동) ──────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kcd/report:local
    container_name: kcd-app
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-kcd}
      DB_PASSWORD: ${DB_PASSWORD:-kcd_local_pw}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -Duser.timezone=UTC"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - kcd-net

volumes:
  postgres-data:
    driver: local

networks:
  kcd-net:
    driver: bridge
