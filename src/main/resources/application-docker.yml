# ──────────────────────────────────────────────────────────────
# 앱도 docker compose 안에서 실행.
# 컨테이너간 통신은 service name 으로.
# ──────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/kcd_report
    username: ${DB_USERNAME:kcd}
    password: ${DB_PASSWORD:kcd_local_pw}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: report-platform-docker

logging:
  level:
    root: INFO
